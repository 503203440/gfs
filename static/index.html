<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gfs</title>
    <script src="/static/echarts.min.js"></script>
    <style>
        #box {
            display: flex;
            flex-direction: row;
            width: 100%;
        }

        #sysCpu,
        #sysMem {
            width: 600px;
            height: 337px;
        }

        #info {
            padding-left: 10px;
            color: #636e72;
        }

        #info span {
            margin: 0 5px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #0984e3;
            line-height: 30px;
        }

        @media screen and (max-width: 1024px) {
            #box {
                display: flex;
                flex-direction: column;
                width: 100%;
            }

            #sysCpu,
            #sysMem {
                width: 100%;
                height: 337px;
            }
        }
    </style>
</head>

<body>
    <div id="box">
        <div id="sysCpu">

        </div>
        <div id="sysMem">

        </div>
    </div>
    <div id="info">
        日期<span id="today"></span>
        <br>
        处理数量<span id="total"></span>
        <br>
        启动时间<span id="starttime"></span>
    </div>
</body>

</html>
<script type="application/javascript">

    fetch("/todayFileTotal").then(res => res.json()).then(res => {
        console.log(res)
        let today = res.today
        let total = res.total
        document.querySelector('#today').innerHTML = today
        document.querySelector('#total').innerHTML = total
    })

    fetch("/starttime").then(res => res.json()).then(res => {
        document.querySelector('#starttime').innerHTML = res
    })

    const cpuOption = {
        title: {
            text: 'cpu'
        },
        xAxis: {
            type: 'time',
            axisLabel: {
                interval: 40,
                rotate: 45
            }
            ,
            splitLine: {
                show: false
            }
        },
        yAxis: {
            type: 'value',
            // boundaryGap: [0, '100%'],
            min: 0,
            max: 100,
            splitLine: {
                show: false
            }
        },
        series: [
            {
                name: 'cpuInfo',
                type: 'line',
                data: []
            }
        ]
    }
    const cpuChart = echarts.init(document.getElementById('sysCpu'));
    cpuChart.setOption(cpuOption)

    const memOption = {
        title: {
            text: 'mem'
        },
        // tooltip控制是否显示鼠标悬浮数值显示
        tooltip: {
            trigger: 'axis', // 触发类型为坐标轴触发
            axisPointer: {
                type: 'cross',
            },
            formatter: function (params) {
                // 自定义提示框内容
                return params.map(function (param) {
                    return `内存占用率: ${param.value[1]}%`;
                }).join('<br>');
            }
        },
        xAxis: {
            type: 'time',
            axisLabel: {
                interval: 40,
                rotate: 45
            }
            ,
            splitLine: {
                show: false
            }
        },
        yAxis: {
            type: 'value',
            // boundaryGap: [0, '100%'],
            min: 0,
            max: 100,
            splitLine: {
                show: false
            }
        },
        series: [
            {
                name: 'memInfo',
                type: 'line',
                areaStyle: {},// 线条下填充
                data: []
            }
        ]
    }
    const memChart = echarts.init(document.getElementById('sysMem'));
    memChart.setOption(memOption)


    /**
     * 获取系统信息并渲染到echarts图表
     */
    function getSysInfo() {
        fetch('/cpuInfo').then(res => res.json()).then(res => {
            let array = []
            res?.forEach(i => {
                array.push({
                    name: 'cpuLoad',
                    value: [i.time, i.cpuLoad]
                })
            })
            cpuChart.setOption({
                series: [
                    {
                        data: array
                    }
                ]
            })
        })

        fetch('/memInfo').then(res => res.json()).then(res => {
            let array = []
            res?.forEach(i => {
                array.push({
                    name: 'memLoad',
                    value: [i.time, i.memInfo?.usedPercent]
                })
            })
            memChart.setOption({
                series: [
                    {
                        data: array
                    }
                ]
            })
        })
    }

    // 定时执行
    setInterval(() => {
        this.getSysInfo()
    }, 1000)

</script>
